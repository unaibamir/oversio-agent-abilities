name: Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

# Default to no permissions; grant the minimum per job.
permissions: {}

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  # PHP_CodeSniffer against the WordPress Coding Standards ruleset.
  phpcs:
    name: Coding standards (PHPCS)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: '8.3'
          coverage: none
          tools: cs2pr

      - name: Install Composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0

      - name: Run PHPCS
        id: phpcs
        run: vendor/bin/phpcs --report-full --report-checkstyle=./phpcs-report.xml

      - name: Annotate PHPCS results on the PR
        if: ${{ always() && steps.phpcs.outcome == 'failure' }}
        run: cs2pr ./phpcs-report.xml

  # PHPStan static analysis at the level configured in phpstan.neon.dist.
  phpstan:
    name: Static analysis (PHPStan)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: '8.3'
          coverage: none
          tools: cs2pr

      - name: Install Composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --error-format=checkstyle | cs2pr

  # PHPUnit across the supported PHP (>= 8.0) and WordPress (>= 6.9) range.
  phpunit:
    name: PHP ${{ matrix.php }} · WP ${{ matrix.wp }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4']
        wp: ['6.9', 'latest']
    services:
      # MariaDB matches the development environment and the engine the audit
      # table's install/uninstall DDL tests are written against. (The plugin
      # also runs on MySQL 8.0; the only real incompatibility, the zero-date
      # column default, is fixed. The remaining DDL-in-transaction differences
      # are WordPress test-harness artifacts, not plugin behavior.)
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      WP_TESTS_DIR: /tmp/wordpress-tests-lib
      WP_CORE_DIR: /tmp/wordpress
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2.37.1
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, zip, gd
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0

      - name: Provision WordPress core + PHPUnit test suite
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y subversion
          WP_VERSION='${{ matrix.wp }}'
          # Resolve "latest" to a concrete version so core and the test suite stay in lockstep.
          if [ "$WP_VERSION" = "latest" ]; then
            WP_VERSION="$(curl -fsSL https://api.wordpress.org/core/version-check/1.7/ \
              | grep -o '"version":"[0-9.]*"' | head -1 | grep -o '[0-9.]*')"
          fi
          if [ "$WP_VERSION" = "trunk" ]; then TAG="trunk"; else TAG="tags/${WP_VERSION}"; fi

          mkdir -p "$WP_CORE_DIR"
          if [ "$WP_VERSION" = "trunk" ]; then
            curl -fsSL https://wordpress.org/nightly-builds/wordpress-latest.zip -o /tmp/wp.zip
            unzip -q /tmp/wp.zip -d /tmp/
            mv /tmp/wordpress/* "$WP_CORE_DIR/"
          else
            curl -fsSL "https://wordpress.org/wordpress-${WP_VERSION}.tar.gz" -o /tmp/wp.tgz
            tar --strip-components=1 -zxmf /tmp/wp.tgz -C "$WP_CORE_DIR"
          fi

          mkdir -p "$WP_TESTS_DIR"
          svn export --quiet --force "https://develop.svn.wordpress.org/${TAG}/tests/phpunit/includes/" "${WP_TESTS_DIR}/includes"
          svn export --quiet --force "https://develop.svn.wordpress.org/${TAG}/tests/phpunit/data/" "${WP_TESTS_DIR}/data"
          curl -fsSL "https://develop.svn.wordpress.org/${TAG}/wp-tests-config-sample.php" -o "${WP_TESTS_DIR}/wp-tests-config.php"
          sed -i "s/youremptytestdbnamehere/wordpress_test/" "${WP_TESTS_DIR}/wp-tests-config.php"
          sed -i "s/yourusernamehere/root/" "${WP_TESTS_DIR}/wp-tests-config.php"
          sed -i "s/yourpasswordhere/root/" "${WP_TESTS_DIR}/wp-tests-config.php"
          sed -i "s|localhost|127.0.0.1|" "${WP_TESTS_DIR}/wp-tests-config.php"
          sed -i "s:dirname( __FILE__ ) . '/src/':'${WP_CORE_DIR}/':" "${WP_TESTS_DIR}/wp-tests-config.php"

      - name: Create test database
        run: mysqladmin create wordpress_test -uroot -proot -h127.0.0.1 -P3306 || true

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  # Single gating check that fans in the whole suite — this is the context to
  # require in branch protection, so the matrix can change without re-wiring.
  test-result:
    name: Test Suite Result
    needs: [phpcs, phpstan, phpunit]
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    permissions: {}
    steps:
      - name: Fail if any required job failed
        run: |
          if [ "${{ needs.phpcs.result }}" != "success" ] \
            || [ "${{ needs.phpstan.result }}" != "success" ] \
            || [ "${{ needs.phpunit.result }}" != "success" ]; then
            echo "One or more required checks failed."
            exit 1
          fi
          echo "All required checks passed."

# Let /.well-known/ requests reach WordPress (index.php) instead of being
# caught by the generated "location ~ /\. { deny all; }" dotfile rule.
#
# The "^~" prefix modifier makes nginx stop at this location and skip the
# regex dotfile-deny for anything under /.well-known/, so OAuth discovery
# documents (oauth-protected-resource, oauth-authorization-server) are served
# by PHP. Other hidden files (.git, .htaccess, .env, ...) still hit the deny.
#
# This file is mounted at /mnt/ddev_config/nginx/ and included inside the
# server {} block after the generated vhost, so it takes precedence.
location ^~ /.well-known/ {
    try_files $uri $uri/ /index.php?$args;
}
